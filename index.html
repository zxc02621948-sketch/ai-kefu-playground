<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AI 客服遊樂場｜來當奧客，試試問不問得倒它</title>
<meta name="description" content="一套真實部署過的 AI 智能客服，開放試玩。你當客人，它接客——額度 10 句，看它怎麼接住你。">
<!-- 社群分享預覽（Threads/FB 連結卡片） -->
<meta property="og:title" content="AI 客服遊樂場｜來當奧客，試試問不問得倒它">
<meta property="og:description" content="真實部署過的 AI 智能客服開放試玩。你當客人，它接客。">
<meta property="og:type" content="website">
<!-- TODO: 之後補一張 og:image（1200x630）讓連結卡片更好看 -->
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --panel2: #1c2330;
    --border: #2a3441;
    --text: #e6e9ef;
    --text-dim: #8b97a8;
    --accent: #4cc9b0;
    --accent-dim: rgba(76, 201, 176, .14);
    --user-bubble: #2f6feb;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', 'Microsoft JhengHei', 'PingFang TC', sans-serif;
    display: flex;
    flex-direction: column;
  }

  /* ── 頂部 ── */
  header {
    padding: 14px 18px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    flex-shrink: 0;
  }
  header h1 {
    font-size: 1.05rem;
    letter-spacing: .04em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  header h1 .dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: breathe 2.2s ease-in-out infinite alternate;
  }
  @keyframes breathe { from { opacity: .55; } to { opacity: 1; } }
  header p {
    margin-top: 4px;
    font-size: .8rem;
    color: var(--text-dim);
  }

  /* ── 訊息區 ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 14px 8px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    -webkit-overflow-scrolling: touch;
  }
  .msg {
    max-width: 86%;
    padding: 10px 13px;
    border-radius: 14px;
    font-size: .92rem;
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-word;
    animation: pop-in .18s ease;
  }
  @keyframes pop-in { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }
  .msg.bot {
    align-self: flex-start;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .msg.user {
    align-self: flex-end;
    background: var(--user-bubble);
    border-bottom-right-radius: 4px;
  }
  .msg.system {
    align-self: center;
    background: transparent;
    color: var(--text-dim);
    font-size: .78rem;
    padding: 2px 8px;
  }

  /* 打字中 */
  .typing {
    align-self: flex-start;
    display: flex;
    gap: 5px;
    padding: 12px 16px;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 14px;
    border-bottom-left-radius: 4px;
  }
  .typing span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
    animation: blink 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%, 60%, 100% { opacity: .25; } 30% { opacity: 1; } }

  /* ── 場景卡 ── */
  #scenarios {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 4px 2px;
  }
  .scenario-card {
    text-align: left;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 13px 14px;
    color: var(--text);
    font-size: .9rem;
    line-height: 1.5;
    cursor: pointer;
    transition: border-color .15s, background .15s, transform .1s;
    font-family: inherit;
  }
  .scenario-card:hover, .scenario-card:active {
    border-color: var(--accent);
    background: var(--accent-dim);
    transform: translateY(-1px);
  }
  .scenario-card b { color: var(--accent); display: block; margin-bottom: 3px; font-size: .95rem; }

  /* ── 輸入列 ── */
  #input-bar {
    flex-shrink: 0;
    display: flex;
    gap: 8px;
    padding: 10px 12px calc(10px + env(safe-area-inset-bottom, 0px));
    border-top: 1px solid var(--border);
    background: var(--panel);
  }
  #chat-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 22px;
    color: var(--text);
    font-size: 16px; /* 16px 防 iOS 自動縮放 */
    font-family: inherit;
    padding: 10px 16px;
    outline: none;
  }
  #chat-input:focus { border-color: var(--accent); }
  #send-btn {
    flex-shrink: 0;
    width: 44px; height: 44px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: #08110e;
    font-size: 1.1rem;
    cursor: pointer;
    transition: filter .15s, transform .1s;
  }
  #send-btn:hover:not(:disabled) { filter: brightness(1.12); }
  #send-btn:active:not(:disabled) { transform: scale(.94); }
  #send-btn:disabled { filter: grayscale(.8) brightness(.6); cursor: default; }

  /* ── 底部一行 ── */
  footer {
    flex-shrink: 0;
    text-align: center;
    font-size: .72rem;
    color: var(--text-dim);
    padding: 6px 14px;
    background: var(--panel);
  }
  footer a { color: var(--accent); text-decoration: none; }

  @media (min-width: 720px) {
    /* 桌面置中卡片化 */
    body { align-items: center; justify-content: center; background: #090d12; padding: 24px; }
    #app {
      width: 100%;
      max-width: 520px;
      height: min(780px, 92vh);
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 18px 60px rgba(0,0,0,.5);
      background: var(--bg);
    }
  }
  @media (max-width: 719.9px) {
    #app { display: flex; flex-direction: column; height: 100dvh; }
    body { display: block; }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1><span class="dot"></span>AI 客服遊樂場</h1>
    <p>真實部署過的 AI 智能客服，開放試玩——你當客人，它接客。每人 10 句額度。</p>
  </header>

  <div id="messages"></div>

  <div id="input-bar">
    <input id="chat-input" type="text" placeholder="輸入訊息…" maxlength="500" autocomplete="off">
    <button id="send-btn" aria-label="送出">➤</button>
  </div>

  <footer>
    此系統實際部署於店家粉專與官網私訊。想要你的店的版本？<a id="contact-link" href="#" target="_blank" rel="noopener">聯絡我們 ›</a>
  </footer>
</div>

<script>
(function () {
  /* ════════ 設定區：只需要改這兩行 ════════ */
  const WEBHOOK_URL  = 'https://boss-n8n.zeabur.app/webhook/playground-chat';
  const CONTACT_URL  = 'https://www.threads.net/@aicreateaworld'; // 改成你要接洽的入口（Threads/FB/LINE）
  /* ══════════════════════════════════════ */

  document.getElementById('contact-link').href = CONTACT_URL;

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('chat-input');
  const sendBtn = document.getElementById('send-btn');

  // 訪客身分：localStorage uuid → 後端 session_id（額度與記憶都掛在這個 key 上）
  let uid = localStorage.getItem('playground_uid');
  if (!uid) {
    uid = (crypto.randomUUID ? crypto.randomUUID() : 'pg_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8));
    localStorage.setItem('playground_uid', uid);
  }

  let busy = false;

  function addMsg(role, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function showTyping() {
    const t = document.createElement('div');
    t.className = 'typing';
    t.id = 'typing';
    t.innerHTML = '<span></span><span></span><span></span>';
    messagesEl.appendChild(t);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
  function hideTyping() { document.getElementById('typing')?.remove(); }

  // 開場：本地歡迎訊息＋兩張場景卡（點了就替玩家送出 1 / 2）
  function showWelcome() {
    addMsg('bot', '歡迎來到 AI 客服遊樂場 🎮\n你有 10 句的體驗額度（12 小時重置）。\n選一個場景開始：');
    const wrap = document.createElement('div');
    wrap.id = 'scenarios';
    wrap.innerHTML = `
      <button class="scenario-card" data-pick="1"><b>① 問問這套 AI 客服</b>怎麼運作、多少錢、可不可靠——儘管問，你現在對話的就是產品本人。</button>
      <button class="scenario-card" data-pick="2"><b>② 你當裝修店的客人</b>體驗真實部署過的店家客服——問報價、問工程、當奧客都歡迎 😏</button>
    `;
    messagesEl.appendChild(wrap);
    wrap.querySelectorAll('.scenario-card').forEach(btn => {
      btn.addEventListener('click', () => {
        wrap.remove();
        send(btn.dataset.pick);
      });
    });
  }

  async function send(text) {
    text = (text || '').trim();
    if (!text || busy) return;
    busy = true;
    sendBtn.disabled = true;
    addMsg('user', text);
    inputEl.value = '';
    showTyping();

    try {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 60000);

      const res = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, session_id: uid }),
        signal: controller.signal,
      });
      clearTimeout(timeoutId);
      if (!res.ok) throw new Error('HTTP ' + res.status);

      const raw = await res.text();
      let data = {};
      try { data = JSON.parse(raw); } catch (e) {}
      const reply = data.reply || data.output || '';
      hideTyping();
      if (!reply) throw new Error('empty reply');
      addMsg('bot', reply);
    } catch (err) {
      hideTyping();
      addMsg('system', err.name === 'AbortError'
        ? '回覆超時了，請再試一次 🙏'
        : '服務暫時沒有回應，請稍後再試 🙏');
      console.error('[Playground]', err);
    } finally {
      busy = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  sendBtn.addEventListener('click', () => send(inputEl.value));
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.isComposing) send(inputEl.value);
  });

  showWelcome();
})();
</script>
</body>
</html>
