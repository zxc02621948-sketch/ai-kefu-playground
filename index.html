<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AI Customer Service Playground — try to stump it</title>
<meta name="description" content="A real, deployed AI customer-service agent, open to try. You're the customer, it handles you — 10 messages, see how it holds up.">
<!-- Social share preview (Threads/FB link card) -->
<meta property="og:title" content="AI Customer Service Playground — try to stump it">
<meta property="og:description" content="A real, deployed AI customer-service agent, open to try. You're the customer, it handles you.">
<meta property="og:type" content="website">
<!-- TODO: add an og:image (1200x630) for a nicer link card -->
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --panel2: #1c2330;
    --border: #2a3441;
    --text: #e6e9ef;
    --text-dim: #8b97a8;
    --accent: #4cc9b0;
    --accent-dim: rgba(76, 201, 176, .14);
    --user-bubble: #2f6feb;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', 'Microsoft JhengHei', 'PingFang TC', sans-serif;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    padding: 14px 18px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    flex-shrink: 0;
  }
  header h1 {
    font-size: 1.05rem;
    letter-spacing: .04em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  header h1 .dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: breathe 2.2s ease-in-out infinite alternate;
  }
  @keyframes breathe { from { opacity: .55; } to { opacity: 1; } }
  header p {
    margin-top: 4px;
    font-size: .8rem;
    color: var(--text-dim);
  }

  /* ── Messages ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 14px 8px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    -webkit-overflow-scrolling: touch;
  }
  .msg {
    max-width: 86%;
    padding: 10px 13px;
    border-radius: 14px;
    font-size: .92rem;
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-word;
    animation: pop-in .18s ease;
  }
  @keyframes pop-in { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }
  .msg.bot {
    align-self: flex-start;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .msg.user {
    align-self: flex-end;
    background: var(--user-bubble);
    border-bottom-right-radius: 4px;
  }
  .msg.user img { display: block; max-width: 200px; border-radius: 8px; margin-top: 6px; }
  .msg.system {
    align-self: center;
    background: transparent;
    color: var(--text-dim);
    font-size: .78rem;
    padding: 2px 8px;
  }

  /* Typing */
  .typing {
    align-self: flex-start;
    display: flex;
    gap: 5px;
    padding: 12px 16px;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 14px;
    border-bottom-left-radius: 4px;
  }
  .typing span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
    animation: blink 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%, 60%, 100% { opacity: .25; } 30% { opacity: 1; } }

  /* ── Scenario cards ── */
  #scenarios {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 4px 2px;
  }
  .scenario-card {
    text-align: left;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 13px 14px;
    color: var(--text);
    font-size: .9rem;
    line-height: 1.5;
    cursor: pointer;
    transition: border-color .15s, background .15s, transform .1s;
    font-family: inherit;
  }
  .scenario-card:hover, .scenario-card:active {
    border-color: var(--accent);
    background: var(--accent-dim);
    transform: translateY(-1px);
  }
  .scenario-card b { color: var(--accent); display: block; margin-bottom: 3px; font-size: .95rem; }

  /* ── Image preview (above input bar) ── */
  #img-preview {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    border-top: 1px solid var(--border);
    background: var(--panel);
    flex-shrink: 0;
  }
  #img-preview img { height: 46px; border-radius: 6px; border: 1px solid var(--border); }
  #img-preview button { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: .82rem; }

  /* ── Input bar ── */
  #input-bar {
    flex-shrink: 0;
    display: flex;
    gap: 8px;
    padding: 10px 12px calc(10px + env(safe-area-inset-bottom, 0px));
    border-top: 1px solid var(--border);
    background: var(--panel);
  }
  #attach-btn {
    flex-shrink: 0;
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--panel2);
    color: var(--text);
    font-size: 1.1rem;
    cursor: pointer;
    transition: filter .15s, transform .1s;
  }
  #attach-btn:hover { filter: brightness(1.2); }
  #attach-btn:active { transform: scale(.94); }
  #chat-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 22px;
    color: var(--text);
    font-size: 16px; /* 16px stops iOS auto-zoom */
    font-family: inherit;
    padding: 10px 16px;
    outline: none;
  }
  #chat-input:focus { border-color: var(--accent); }
  #send-btn {
    flex-shrink: 0;
    width: 44px; height: 44px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: #08110e;
    font-size: 1.1rem;
    cursor: pointer;
    transition: filter .15s, transform .1s;
  }
  #send-btn:hover:not(:disabled) { filter: brightness(1.12); }
  #send-btn:active:not(:disabled) { transform: scale(.94); }
  #send-btn:disabled { filter: grayscale(.8) brightness(.6); cursor: default; }

  /* ── Footer ── */
  footer {
    flex-shrink: 0;
    text-align: center;
    font-size: .72rem;
    color: var(--text-dim);
    padding: 6px 14px;
    background: var(--panel);
  }
  footer a { color: var(--accent); text-decoration: none; }

  @media (min-width: 720px) {
    /* Desktop: centered card */
    body { align-items: center; justify-content: center; background: #090d12; padding: 24px; }
    #app {
      width: 100%;
      max-width: 520px;
      height: min(780px, 92vh);
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 18px 60px rgba(0,0,0,.5);
      background: var(--bg);
    }
  }
  @media (max-width: 719.9px) {
    #app { display: flex; flex-direction: column; height: 100dvh; }
    body { display: block; }
  }
</style>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>
<div id="app">
  <header>
    <h1><span class="dot"></span>AI Customer Service Playground</h1>
    <p>A real, deployed AI customer-service agent — open to try. You're the customer, it handles you. 10 messages each.</p>
  </header>

  <div id="messages"></div>

  <div id="cf-turnstile" style="display:flex;justify-content:center;padding:6px 0 0;"></div>

  <div id="input-bar">
    <input id="file-input" type="file" accept="image/*" style="display:none">
    <button id="attach-btn" type="button" aria-label="Attach photo" title="Send a photo">📷</button>
    <input id="chat-input" type="text" placeholder="Type a message…" maxlength="500" autocomplete="off">
    <button id="send-btn" aria-label="Send">➤</button>
  </div>

  <footer>
    This system runs live on real shops' DMs and websites. Want one for your business? <a id="contact-link" href="#" target="_blank" rel="noopener">Contact us ›</a>
  </footer>
</div>

<script>
(function () {
  /* ════════ Config: only these two lines ════════ */
  const WEBHOOK_URL  = 'https://kefu-gate.zxc02621948.workers.dev';
  const CONTACT_URL  = 'https://www.facebook.com/profile.php?id=61573305406231'; // AI創界 page (can upgrade to m.me/username later)
  const TURNSTILE_SITEKEY = '0x4AAAAAADkdGWequXxB-oSF';
  /* ══════════════════════════════════════ */

  // ── Cloudflare Turnstile (blocks bot/script floods) ──
  let cfToken = null, cfWidgetId = null;
  window.__renderTurnstile = function () {
    if (!window.turnstile) { setTimeout(window.__renderTurnstile, 200); return; }
    if (cfWidgetId !== null) return;
    cfWidgetId = window.turnstile.render('#cf-turnstile', {
      sitekey: TURNSTILE_SITEKEY,
      callback: function (t) { cfToken = t; },
      'expired-callback': function () { cfToken = null; try { window.turnstile.reset(cfWidgetId); } catch (e) {} },
      'error-callback': function () { cfToken = null; },
    });
  };

  document.getElementById('contact-link').href = CONTACT_URL;

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('chat-input');
  const sendBtn = document.getElementById('send-btn');
  const fileInput = document.getElementById('file-input');
  const attachBtn = document.getElementById('attach-btn');

  // Visitor identity: localStorage uuid → backend session_id (quota & memory hang on this key)
  let uid = localStorage.getItem('playground_uid');
  if (!uid) {
    uid = (crypto.randomUUID ? crypto.randomUUID() : 'pg_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8));
    localStorage.setItem('playground_uid', uid);
  }

  let busy = false;
  let pendingImage = null; // resized base64 data URL, or null

  function addMsg(role, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function showTyping() {
    const t = document.createElement('div');
    t.className = 'typing';
    t.id = 'typing';
    t.innerHTML = '<span></span><span></span><span></span>';
    messagesEl.appendChild(t);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
  function hideTyping() { document.getElementById('typing')?.remove(); }

  // ── Image attach: read → downscale → base64 data URL ──
  attachBtn.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', async () => {
    const file = fileInput.files[0];
    fileInput.value = ''; // allow re-picking the same file
    if (!file) return;
    try {
      pendingImage = await resizeToDataURL(file, 1024, 0.8);
      showThumb(pendingImage);
    } catch (e) { console.error('[img]', e); }
  });

  function resizeToDataURL(file, maxSide, quality) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > maxSide || h > maxSide) {
          const r = Math.min(maxSide / w, maxSide / h);
          w = Math.round(w * r); h = Math.round(h * r);
        }
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      const fr = new FileReader();
      fr.onload = () => { img.src = fr.result; };
      fr.onerror = reject;
      fr.readAsDataURL(file);
    });
  }

  function showThumb(dataUrl) {
    let bar = document.getElementById('img-preview');
    if (!bar) {
      bar = document.createElement('div');
      bar.id = 'img-preview';
      document.getElementById('input-bar').insertAdjacentElement('beforebegin', bar);
    }
    bar.innerHTML = '';
    const im = document.createElement('img'); im.src = dataUrl;
    const x = document.createElement('button'); x.type = 'button'; x.textContent = '✕ remove';
    x.onclick = clearPendingImage;
    bar.append(im, x);
    bar.style.display = 'flex';
  }

  function clearPendingImage() {
    pendingImage = null;
    const bar = document.getElementById('img-preview');
    if (bar) { bar.style.display = 'none'; bar.innerHTML = ''; }
  }

  // Opening: local welcome + two scenario cards (clicking sends 1 / 2 for the player)
  function showWelcome() {
    addMsg('bot', "Welcome to the AI Customer Service Playground 🎮\nYou're a customer of this renovation company, and I'm the shop's AI assistant.\nYou have 10 trial messages (resets in 12h). At the end, see what the AI read from your casual chat 👀\nPick a mode to start:");
    const wrap = document.createElement('div');
    wrap.id = 'scenarios';
    wrap.innerHTML = `
      <button class="scenario-card" data-pick="1"><b>① Regular customer</b>Ask about quotes, projects, timelines — anything. See how this real, deployed AI handles it.</button>
      <button class="scenario-card" data-pick="2"><b>② Difficult customer 😏</b>Try to trip it up, ask odd things, be picky — see if it holds.</button>
    `;
    messagesEl.appendChild(wrap);
    wrap.querySelectorAll('.scenario-card').forEach(btn => {
      btn.addEventListener('click', () => {
        wrap.remove();
        send(btn.dataset.pick);
      });
    });
  }

  async function send(text) {
    text = (text || '').trim();
    if ((!text && !pendingImage) || busy) return;
    busy = true;
    sendBtn.disabled = true;
    const userMsg = addMsg('user', text);
    const imageToSend = pendingImage;
    if (imageToSend) {
      const im = document.createElement('img');
      im.src = imageToSend;
      userMsg.appendChild(im);
    }
    clearPendingImage();
    inputEl.value = '';
    showTyping();

    // Grab this message's Turnstile token, then reset for the next (one-time per message)
    const sendToken = cfToken;
    cfToken = null;
    try { if (cfWidgetId !== null && window.turnstile) window.turnstile.reset(cfWidgetId); } catch (e) {}

    try {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 60000);

      const res = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, session_id: uid, cf_token: sendToken, image: imageToSend || null }),
        signal: controller.signal,
      });
      clearTimeout(timeoutId);
      if (!res.ok) throw new Error('HTTP ' + res.status);

      const raw = await res.text();
      let data = {};
      try { data = JSON.parse(raw); } catch (e) {}
      const reply = data.reply || data.output || '';
      hideTyping();
      if (!reply) throw new Error('empty reply');
      addMsg('bot', reply);
    } catch (err) {
      hideTyping();
      addMsg('system', err.name === 'AbortError'
        ? 'Response timed out — please try again 🙏'
        : "The service isn't responding right now — please try again shortly 🙏");
      console.error('[Playground]', err);
    } finally {
      busy = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  sendBtn.addEventListener('click', () => send(inputEl.value));
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.isComposing) send(inputEl.value);
  });

  showWelcome();
  window.__renderTurnstile();
})();
</script>
</body>
</html>
